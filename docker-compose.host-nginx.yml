# ============================================================
#  PROD compose — для сервера с СУЩЕСТВУЮЩИМ nginx на хосте
#  Backend и Frontend экспонируются только на localhost.
#  Хостовый nginx проксирует трафик и управляет SSL.
#  Usage: docker compose -f docker-compose.host-nginx.yml --env-file .env.prod up -d
# ============================================================
services:
  postgres:
    image: postgres:16-alpine
    container_name: crm_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7-alpine
    container_name: crm_redis
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 300m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: crm_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-crm_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      ENVIRONMENT: production
      BOT_TOKEN: ${BOT_TOKEN:-}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      INTERNAL_BOT_TOKEN: ${INTERNAL_BOT_TOKEN:?INTERNAL_BOT_TOKEN is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["https://crm.llve.ru"]'}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-admin@crm.llve.ru}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:?SUPERADMIN_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # Доступен только с localhost — хостовый nginx проксирует сюда
      - "127.0.0.1:8000:8000"
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: crm_frontend
    ports:
      # Доступен только с localhost — хостовый nginx проксирует сюда
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    restart: always
    deploy:
      resources:
        limits:
          memory: 128m

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: crm_bot
    environment:
      BOT_TOKEN: ${BOT_TOKEN:?BOT_TOKEN is required}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      BACKEND_INTERNAL_URL: http://backend:8000
      INTERNAL_BOT_TOKEN: ${INTERNAL_BOT_TOKEN:?INTERNAL_BOT_TOKEN is required}
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  postgres_prod_data:
  redis_prod_data:
