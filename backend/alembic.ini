[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# This default is overridden at runtime by the DATABASE_URL env variable (see alembic/env.py).
# For manual host-machine runs: export DATABASE_URL=postgresql+asyncpg://crm:crm_secret@localhost:5432/crm_db
sqlalchemy.url = postgresql+asyncpg://crm:crm_secret@postgres:5432/crm_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
