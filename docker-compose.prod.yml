# ============================================================
#  PROD compose — optimized builds, no source mounts, nginx
#  Usage: docker compose -f docker-compose.prod.yml up --build -d
#  Make sure to set all env vars in .env.prod or pass via environment
# ============================================================
services:
  postgres:
    image: postgres:16-alpine
    container_name: crm_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # No external ports in prod — only reachable by other services
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7-alpine
    container_name: crm_redis
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 300m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: crm_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-crm_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      ENVIRONMENT: production
      BOT_TOKEN: ${BOT_TOKEN:-}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      INTERNAL_BOT_TOKEN: ${INTERNAL_BOT_TOKEN:?INTERNAL_BOT_TOKEN is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-'["https://yourdomain.com"]'}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-admin@crm.local}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:?SUPERADMIN_PASSWORD is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No direct port exposure — accessed via nginx
    expose:
      - "8000"
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: crm_frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: always
    deploy:
      resources:
        limits:
          memory: 128m

  nginx:
    image: nginx:1.25-alpine
    container_name: crm_nginx
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    restart: always
    deploy:
      resources:
        limits:
          memory: 64m

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: crm_bot
    environment:
      BOT_TOKEN: ${BOT_TOKEN:?BOT_TOKEN is required}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379/1
      BACKEND_INTERNAL_URL: http://backend:8000
      INTERNAL_BOT_TOKEN: ${INTERNAL_BOT_TOKEN:?INTERNAL_BOT_TOKEN is required}
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  postgres_prod_data:
  redis_prod_data:
